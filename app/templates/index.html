{% extends 'base.html' %}

{% block title %}vid2gif • New Job{% endblock %}

{% block head %}
  <script>
    function toggleCustom(selectElId, customInputId, originalCheckboxId) {
      const sel = document.getElementById(selectElId);
      const inp = document.getElementById(customInputId);
      const orig = originalCheckboxId ? document.getElementById(originalCheckboxId) : null;
      const useCustom = sel.value === 'custom' && !(orig && orig.checked);
      inp.classList.toggle('d-none', !useCustom);
      inp.disabled = !useCustom;
      if (!useCustom) inp.value = '';
    }

    async function fetchDirs(path) {
      const res = await fetch(`/api/listdir?path=${encodeURIComponent(path)}`);
      return res.json();
    }

    async function addSelect(basePath) {
      const dirs = await fetchDirs(basePath);
      if (!dirs.length) return;
      const container = document.getElementById('lib-browser');
      const sel = document.createElement('select');
      sel.className = 'form-select mt-2';
      sel.appendChild(new Option('...', ''));
      dirs.forEach(d => sel.appendChild(new Option(d, d)));
      sel.addEventListener('change', () => {
        while (sel.nextSibling) sel.parentNode.removeChild(sel.nextSibling);
        const vid = document.getElementById('video');
        const choice = sel.value;
        const newPath = choice ? `${basePath}/${choice}` : basePath;
        vid.value = newPath;
        if (choice) addSelect(newPath);
      });
      container.appendChild(sel);
    }

    function saveForm() {
      const form = document.getElementById('newJobForm');
      Array.from(form.elements).forEach(el => {
        if (!el.name) return;
        const key = 'newjob_' + el.name;
        if (el.type === 'checkbox') {
          localStorage.setItem(key, el.checked ? '1' : '0');
        } else {
          localStorage.setItem(key, el.value);
        }
      });
    }

    function loadForm() {
      const form = document.getElementById('newJobForm');
      Array.from(form.elements).forEach(el => {
        if (!el.name) return;
        const key = 'newjob_' + el.name;
        const val = localStorage.getItem(key);
        if (val === null) return;
        if (el.type === 'checkbox') {
          el.checked = val === '1';
        } else {
          el.value = val;
        }
      });
    }

    async function init() {
      loadForm();
      toggleCustom('height_preset','height_custom');
      toggleCustom('fps_preset','fps_custom','fps_original');
      toggleCustom('clip_len_preset','clip_len_custom');
      const vid = document.getElementById('video');
      if (!vid.value) {
        vid.value = '{{ lib_root }}';
      }
      await addSelect('{{ lib_root }}');
      const form = document.getElementById('newJobForm');
      form.addEventListener('input', saveForm);
      form.addEventListener('change', saveForm);
    }
    window.addEventListener('DOMContentLoaded', init);
  </script>
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h3 mb-3">New Job</h1>
          <p class="text-muted small">ffmpeg: {{ ffmpeg }}</p>

          <form id="newJobForm" method="post" action="/api/add" class="row g-3">
            <div class="col-12">
              <label class="form-label">Video path (under /library)</label>
              <input id="video" name="video" placeholder="/library/movies/Example.mp4" class="form-control" required>
              <div id="lib-browser" class="d-flex flex-wrap gap-2 mt-2"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Height</label>
              <select id="height_preset" name="height_preset" onchange="toggleCustom('height_preset','height_custom')" class="form-select">
                <option value="240">240</option>
                <option value="360">360</option>
                <option value="480" selected>480</option>
                <option value="720">720</option>
                <option value="1080">1080</option>
                <option value="custom">Custom…</option>
              </select>
              <input id="height_custom" name="height_custom" placeholder="e.g. 500" class="form-control mt-2 d-none">
            </div>

            <div class="col-md-4">
              <label class="form-label">FPS</label>
              <select id="fps_preset" name="fps_preset" onchange="toggleCustom('fps_preset','fps_custom','fps_original')" class="form-select">
                <option value="10">10</option>
                <option value="12">12</option>
                <option value="15" selected>15</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="30">30</option>
                <option value="custom">Custom…</option>
              </select>
              <input id="fps_custom" name="fps_custom" placeholder="e.g. 17" class="form-control mt-2 d-none">
              <div class="form-check mt-2">
                <input type="checkbox" id="fps_original" name="fps_original" class="form-check-input" onchange="toggleCustom('fps_preset','fps_custom','fps_original')">
                <label class="form-check-label" for="fps_original">Original</label>
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Clip Length (seconds)</label>
              <select id="clip_len_preset" name="clip_len_preset" onchange="toggleCustom('clip_len_preset','clip_len_custom')" class="form-select">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="custom">Custom…</option>
              </select>
              <input id="clip_len_custom" name="clip_len_custom" placeholder="e.g. 2.75" class="form-control mt-2 d-none">
            </div>

            <div class="col-12">
              <label class="form-label">Percent Points (comma list)</label>
              <input name="percent_points" value="{{ defaults.percent_points }}" class="form-control">
            </div>

            <div class="col-sm-3">
              <label class="form-label">Abs Early (s)</label>
              <input name="abs_early" value="{{ defaults.abs_early }}" class="form-control">
            </div>
            <div class="col-sm-3">
              <label class="form-label">Abs Late from End (s)</label>
              <input name="abs_late_from_end" value="{{ defaults.abs_late_from_end }}" class="form-control">
            </div>
            <div class="col-sm-3">
              <label class="form-label">Start Buffer (s)</label>
              <input name="start_buffer" value="{{ defaults.start_buffer }}" class="form-control">
            </div>
            <div class="col-sm-3">
              <label class="form-label">End Buffer (s)</label>
              <input name="end_buffer" value="{{ defaults.end_buffer }}" class="form-control">
            </div>

            <div class="col-12 form-check">
              <input type="checkbox" name="loop_forever" id="loop_forever" class="form-check-input" checked>
              <label class="form-check-label" for="loop_forever">Loop forever</label>
            </div>

            <div class="col-12 form-check">
              <input type="checkbox" name="smooth" id="smooth" class="form-check-input" {% if defaults.smooth %}checked{% endif %}>
              <label class="form-check-label" for="smooth">Smooth motion</label>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary">Add Job</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
