{% extends 'base.html' %}

{% block title %}vid2gif – Live Logs{% endblock %}

{% block head %}
  <style>
    #logbox {
      background: var(--bs-body-bg); color: var(--bs-success-text-emphasis, #0f0);
      padding: 12px; border-radius: 8px;
      height: 60vh; overflow: auto; white-space: pre-wrap; font-family: var(--bs-font-monospace);
      border: 1px solid var(--bs-border-color);
    }
    .statusbar { margin-top: 10px; font-size: 13px; color: var(--bs-secondary-color); }
    .pill { padding: 2px 8px; border-radius: 999px; color:#fff; font-size: 12px; }
    .running { background: var(--bs-primary); }
    .success { background: var(--bs-success); }
    .failed { background: var(--bs-danger); }
    .queued { background: var(--bs-secondary); }
    .idle { background: var(--bs-secondary); }
  </style>
{% endblock %}

{% block content %}
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="h3 mb-3">Live Logs</h2>

      <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
        <label for="jobSel" class="form-label m-0 me-2">Job:</label>
        <select id="jobSel" onchange="startStream()" class="form-select form-select-sm w-auto">
          <option value="live" selected>Live</option>
          {% for j in jobs %}
            <option value="{{ j.id }}">{{ j.id }} | {{ j.status }} | {{ j.video }}</option>
          {% endfor %}
        </select>
        <button class="btn btn-primary btn-sm" onclick="startStream()">Start</button>
        <button class="btn btn-secondary btn-sm" onclick="stopStream()">Stop</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="clearLog()">Clear</button>
        <div class="form-check form-switch ms-2">
          <input class="form-check-input" type="checkbox" id="autoscroll" checked>
          <label class="form-check-label" for="autoscroll">Autoscroll</label>
        </div>
      </div>

      <div id="logbox" class="mb-2"></div>
      <div class="statusbar">
        <span id="jobStatus" class="pill idle">idle</span>
        <span id="progressText"></span>
      </div>
    </div>
  </div>

  <script>
    let es = null;
    let currentJob = "";
    let lastJob = "";
    let autoMode = true;

    function append(line) {
      const box = document.getElementById('logbox');
      box.textContent += (box.textContent ? "\n" : "") + line;
      if (document.getElementById('autoscroll').checked) {
        box.scrollTop = box.scrollHeight;
      }
    }
    function clearLog() {
      document.getElementById('logbox').textContent = "";
    }
    function stopStream() {
      if (es) { es.close(); es = null; }
    }
    function setStatus(text) {
      const pill = document.getElementById('jobStatus');
      const status = text || "idle";
      pill.textContent = status;
      pill.className = "pill " + status;
    }
    function setProgress(text) {
      document.getElementById('progressText').textContent = text || "";
    }
    function rememberStreamJob(line) {
      const match = line.match(/^\[job ([^\]]+)\]$/);
      if (!match) return;
      lastJob = match[1];
      if (autoMode) {
        currentJob = lastJob;
      }
    }
    function newestFinishedJob(all) {
      return all
        .filter(x => x.status === 'success' || x.status === 'failed')
        .sort((a, b) => (b.id || '').localeCompare(a.id || ''))[0];
    }
    async function refreshStatus() {
      try {
        const res = await fetch('/api/status');
        const all = await res.json();
        if (autoMode) {
          const running = all.find(x => x.status === 'running');
          if (running) {
            currentJob = running.id;
            lastJob = running.id;
            setProgress(running.progress_text);
            setStatus(running.status);
            return;
          }
          const last = all.find(x => x.id === lastJob || x.id === currentJob) || newestFinishedJob(all);
          if (last) {
            lastJob = last.id;
            currentJob = last.id;
            setProgress(last.progress_text);
            setStatus(last.status);
          } else {
            currentJob = '';
            setProgress('');
            setStatus('idle');
          }
        } else if (currentJob) {
          const j = all.find(x => x.id === currentJob);
          if (!j) return;
          lastJob = j.id;
          setProgress(j.progress_text);
          setStatus(j.status);
        }
      } catch (e) {
        // ignore
      }
    }

    function startStream() {
      stopStream();
      const sel = document.getElementById('jobSel');
      const job = sel.value || 'live';
      autoMode = job === 'live';
      currentJob = autoMode ? '' : job;
      clearLog();
      refreshStatus();
      const url = job === 'live' ? '/api/stream/live' : `/api/stream/${encodeURIComponent(job)}`;
      es = new EventSource(url);
      es.onmessage = (e) => {
        rememberStreamJob(e.data);
        append(e.data);
      };
      es.onerror = () => {
        append("[SSE error or ended]");
      };
    }

    // Light polling to update status/progress while SSE streams logs
    setInterval(refreshStatus, 1000);
    document.addEventListener('DOMContentLoaded', () => {
      const jobSel = document.getElementById('jobSel');
      const auto = document.getElementById('autoscroll');
      const savedJob = localStorage.getItem('live_jobSel');
      if (savedJob) {
        const opt = Array.from(jobSel.options).find(o => o.value === savedJob);
        if (opt) jobSel.value = savedJob;
      }
      const savedAuto = localStorage.getItem('live_autoscroll');
      if (savedAuto !== null) auto.checked = savedAuto === 'true';
      jobSel.addEventListener('change', () => {
        localStorage.setItem('live_jobSel', jobSel.value);
      });
      auto.addEventListener('change', () => {
        localStorage.setItem('live_autoscroll', auto.checked);
      });
    });

    window.addEventListener('load', startStream);
  </script>
{% endblock %}
