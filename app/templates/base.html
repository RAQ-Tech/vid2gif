<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}vid2gif{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">vid2gif</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item"><a href="/"          class="nav-link">New Job</a></li>
          <li class="nav-item"><a href="/queue"     class="nav-link">Queue</a></li>
          <li class="nav-item"><a href="/completed" class="nav-link">Completed</a></li>
          <li class="nav-item"><a href="/live"      class="nav-link">Live Logs</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function(){
      var path = location.pathname.replace(/\/+$/,'') || '/';
      document.querySelectorAll('.navbar-nav .nav-link').forEach(function(a){
        var href = a.getAttribute('href').replace(/\/+$/,'') || '/';
        if (href === path) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
