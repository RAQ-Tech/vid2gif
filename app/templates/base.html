<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="color-scheme" content="light dark"/>
  <title>{% block title %}vid2gif{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-md app-navbar sticky-top" aria-label="Primary navigation">
    <div class="container-fluid app-nav-shell">
      <a class="navbar-brand" href="/">
        <span class="brand-mark" aria-hidden="true"><i class="bi bi-filetype-gif"></i></span>
        <span>vid2gif</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-grid-1x2" aria-hidden="true"></i>Dashboard</a></li>
          <li class="nav-item"><a href="/gifs" class="nav-link"><i class="bi bi-filetype-gif" aria-hidden="true"></i>GIFs</a></li>
          <li class="nav-item"><a href="/maintenance" class="nav-link"><i class="bi bi-tools" aria-hidden="true"></i>Maintenance</a></li>
          <li class="nav-item"><a href="/settings" class="nav-link"><i class="bi bi-sliders" aria-hidden="true"></i>Settings</a></li>
          <li class="nav-item"><a href="/system" class="nav-link"><i class="bi bi-hdd-stack" aria-hidden="true"></i>System</a></li>
        </ul>
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm btn-icon nav-theme-toggle" type="button" aria-label="Switch to dark theme" title="Switch to dark theme" aria-pressed="false">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </div>
  </nav>
  <main class="workspace-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function(){
      var path = location.pathname.replace(/\/+$/,'') || '/';
      document.querySelectorAll('.navbar-nav .nav-link').forEach(function(a){
        var href = a.getAttribute('href').replace(/\/+$/,'') || '/';
        if (href === path || (href === '/' && path === '/dashboard')) a.classList.add('active');
      });
      const toggle = document.getElementById('themeToggle');
      const preferred = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light');
      setTheme(preferred);
      toggle.addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });
      function setTheme(theme){
        document.documentElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('theme', theme);
        toggle.innerHTML = theme === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
        toggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
        toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
        toggle.setAttribute('title', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
