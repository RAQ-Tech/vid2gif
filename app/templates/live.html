{% extends 'base.html' %}

{% block title %}vid2gif – Live Logs{% endblock %}

{% block head %}
  <style>
    #logbox {
      background: #111; color: #0f0; padding: 12px; border-radius: 8px;
      height: 60vh; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace;
      border: 1px solid #333;
    }
    .statusbar { margin-top: 10px; font-size: 13px; color: #555; }
    .pill { padding: 2px 8px; border-radius: 999px; color:#fff; font-size: 12px; }
    .running { background:#0a84ff; }
    .success { background:#2ea44f; }
    .failed { background:#d73a49; }
    .queued { background:#6a737d; }
  </style>
{% endblock %}

{% block content %}
  <h2 class="mb-3">Live Logs</h2>

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <label for="jobSel" class="form-label m-0 me-2">Job:</label>
    <select id="jobSel" onchange="startStream()" class="form-select form-select-sm w-auto">
      <option value="">-- select a job --</option>
      {% for j in jobs %}
        <option value="{{ j.id }}">{{ j.id }} | {{ j.status }} | {{ j.video }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-primary btn-sm" onclick="startStream()">Start</button>
    <button class="btn btn-secondary btn-sm" onclick="stopStream()">Stop</button>
    <button class="btn btn-outline-secondary btn-sm" onclick="clearLog()">Clear</button>
  </div>

  <div id="logbox" class="mb-2"></div>
  <div class="statusbar">
    <span id="jobStatus" class="pill queued">queued</span>
    <span id="progressText"></span>
  </div>

  <script>
    let es = null;
    let currentJob = "";

    function append(line) {
      const box = document.getElementById('logbox');
      box.textContent += (box.textContent ? "\n" : "") + line;
      box.scrollTop = box.scrollHeight;
    }
    function clearLog() {
      document.getElementById('logbox').textContent = "";
    }
    function stopStream() {
      if (es) { es.close(); es = null; }
    }
    function setStatus(text) {
      const pill = document.getElementById('jobStatus');
      pill.textContent = text;
      pill.className = "pill " + (text || "queued");
    }

    function startStream() {
      stopStream();
      const sel = document.getElementById('jobSel');
      const job = sel.value;
      if (!job) return;
      currentJob = job;
      clearLog();
      setStatus('running');
      es = new EventSource(`/api/stream/${encodeURIComponent(job)}`);
      es.onmessage = (e) => {
        append(e.data);
      };
      es.onerror = () => {
        append("[SSE error or ended]");
      };
    }

    // Light polling to update status/progress while SSE streams logs
    setInterval(async () => {
      if (!currentJob) return;
      try {
        const res = await fetch('/api/status');
        const all = await res.json();
        const j = all.find(x => x.id === currentJob);
        if (!j) return;
        document.getElementById('progressText').textContent = j.progress_text || "";
        setStatus(j.status || "queued");
      } catch (e) {
        // ignore
      }
    }, 1000);
  </script>
{% endblock %}
