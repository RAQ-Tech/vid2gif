name: Tests and dependency audit

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      STATE_ROOT: /tmp/vid2gif-state
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Prepare test directories
        run: mkdir -p "$STATE_ROOT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Audit runtime dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        run: npm audit --audit-level=low

      - name: Test and build frontend
        run: |
          npm run test:frontend
          npm run build:frontend
          git diff --exit-code -- app/static/test-lab.bundle.js app/static/test-lab.bundle.js.LEGAL.txt app/static/workspace-tables.bundle.js

      - name: Run tests
        run: python -m pytest
