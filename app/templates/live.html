<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>vid2gif – Live Logs</title>
<nav class="tabs" style="display:flex;gap:14px;padding:10px 12px;border-bottom:1px solid #ddd;">
  <a href="/"          class="tab">New Job</a>
  <a href="/queue"     class="tab">Queue</a>
  <a href="/completed" class="tab">Completed</a>
  <a href="/live"      class="tab">Live Logs</a>
</nav>
<style>
  .tabs .tab { color:#0366d6; text-decoration:none; }
  .tabs .tab:hover { text-decoration:underline; }
  .tabs .tab.active { font-weight:600; text-decoration:underline; }
</style>
<script>
  (function(){
    var path = location.pathname.replace(/\/+$/,'') || '/';
    document.querySelectorAll('.tabs .tab').forEach(function(a){
      var href = a.getAttribute('href').replace(/\/+$/,'') || '/';
      if (href === path) a.classList.add('active');
    });
  })();
</script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; }
    .row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    select, button { font-size: 14px; padding: 6px 10px; }
    #logbox {
      background: #111; color: #0f0; padding: 12px; border-radius: 8px;
      height: 60vh; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace;
      border: 1px solid #333;
    }
    .statusbar { margin-top: 10px; font-size: 13px; color: #555; }
    .pill { padding: 2px 8px; border-radius: 999px; color:#fff; font-size: 12px; }
    .running { background:#0a84ff; }
    .success { background:#2ea44f; }
    .failed { background:#d73a49; }
    .queued { background:#6a737d; }
  </style>
</head>
<body>
  <h2>Live Logs</h2>

  <div class="row">
    <label for="jobSel">Job:</label>
    <select id="jobSel" onchange="startStream()">
      <option value="">-- select a job --</option>
      {% for j in jobs %}
        <option value="{{ j.id }}">{{ j.id }} | {{ j.status }} | {{ j.video }}</option>
      {% endfor %}
    </select>
    <button onclick="startStream()">Start</button>
    <button onclick="stopStream()">Stop</button>
    <button onclick="clearLog()">Clear</button>
  </div>

  <div id="logbox"></div>
  <div class="statusbar">
    <span id="jobStatus" class="pill queued">queued</span>
    <span id="progressText"></span>
  </div>

  <script>
    let es = null;
    let currentJob = "";

    function append(line) {
      const box = document.getElementById('logbox');
      box.textContent += (box.textContent ? "\n" : "") + line;
      box.scrollTop = box.scrollHeight;
    }
    function clearLog() {
      document.getElementById('logbox').textContent = "";
    }
    function stopStream() {
      if (es) { es.close(); es = null; }
    }
    function setStatus(text) {
      const pill = document.getElementById('jobStatus');
      pill.textContent = text;
      pill.className = "pill " + (text || "queued");
    }

    function startStream() {
      stopStream();
      const sel = document.getElementById('jobSel');
      const job = sel.value;
      if (!job) return;
      currentJob = job;
      clearLog();
      setStatus('running');
      es = new EventSource(`/api/stream/${encodeURIComponent(job)}`);
      es.onmessage = (e) => {
        append(e.data);
      };
      es.onerror = () => {
        append("[SSE error or ended]");
      };
    }

    // Light polling to update status/progress while SSE streams logs
    setInterval(async () => {
      if (!currentJob) return;
      try {
        const res = await fetch('/api/status');
        const all = await res.json();
        const j = all.find(x => x.id === currentJob);
        if (!j) return;
        document.getElementById('progressText').textContent = j.progress_text || "";
        setStatus(j.status || "queued");
      } catch (e) {
        // ignore
      }
    }, 1000);
  </script>
</body>
</html>
