{% extends 'base.html' %}

{% block title %}vid2gif • Completed{% endblock %}

{% block content %}
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h3 mb-3">Completed</h1>
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-light">
            <tr><th>ID</th><th>Video</th><th>Status</th><th>Output</th><th>Log</th></tr>
          </thead>
          <tbody id="completed-body">
          {% for j in jobs %}
          <tr>
            <td>{{ j.id }}</td>
            <td><code>{{ j.video }}</code></td>
            <td>{{ j.status }}</td>
            <td><code>{{ j.out_gif }}</code></td>
            <td><a href="/logs/{{ j.id }}">view</a></td>
          </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    async function refreshCompleted() {
      try {
        const res = await fetch('/api/status');
        const all = await res.json();
        const completed = all.filter(j => j.status === 'success' || j.status === 'failed');
        completed.sort((a,b) => b.id.localeCompare(a.id));
        const tbody = document.getElementById('completed-body');
        let rows = '';
        completed.forEach(j => {
          rows += `<tr><td>${j.id}</td>` +
                  `<td><code>${j.video}</code></td>` +
                  `<td>${j.status}</td>` +
                  `<td><code>${j.out_gif || ''}</code></td>` +
                  `<td><a href="/logs/${j.id}">view</a></td></tr>`;
        });
        tbody.innerHTML = rows;
      } catch (e) {
        // ignore
      }
    }
    setInterval(refreshCompleted, 5000);
    window.addEventListener('load', refreshCompleted);
  </script>
{% endblock %}
