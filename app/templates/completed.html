{% extends 'base.html' %}

{% block title %}vid2gif • Completed{% endblock %}

{% block content %}
  <h1>Completed</h1>
  <table border="1" cellpadding="6" cellspacing="0">
    <tr><th>ID</th><th>Video</th><th>Status</th><th>Output</th><th>Log</th></tr>
    {% for j in jobs %}
    <tr>
      <td>{{ j.id }}</td>
      <td><code>{{ j.video }}</code></td>
      <td>{{ j.status }}</td>
      <td><code>{{ j.out_gif }}</code></td>
      <td><a href="/logs/{{ j.id }}">view</a></td>
    </tr>
    {% endfor %}
  </table>
{% endblock %}
